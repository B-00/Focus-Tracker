name: focus-tracker

services:
  postgres:
    image: postgres:17-alpine
    container_name: focus-tracker-db
    restart: unless-stopped
    # Host port is 5433 to avoid clashing with a native Postgres on 5432.
    # Inside the container it's still 5432; only the host-side mapping changes.
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: focus_tracker
      POSTGRES_USER: focus_tracker
      POSTGRES_PASSWORD: dev_password
    volumes:
      - focus-tracker-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U focus_tracker -d focus_tracker']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  focus-tracker-pgdata:
    name: focus-tracker-pgdata
